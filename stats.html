<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학습 통계 대시보드</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>
<body style="font-family: sans-serif; padding: 20px; background-color: #f3f4f6; max-width: 800px; margin: 0 auto;">

    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
        <h1 style="color: #333; margin: 0;">📊 학습 통계 리포트</h1>
        <a href="index.html" style="padding: 10px 20px; background-color: #34495e; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 14px;">📅 플래너로 돌아가기</a>
    </div>

    <div style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 25px; text-align: center;">
        <h3 style="margin-top: 0; color: #7f8c8d;">오늘 총 공부 시간</h3>
        <div id="totalTimeDisplay" style="font-size: 40px; font-weight: bold; color: #2c3e50;">00시간 00분</div>
    </div>

    <div style="background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h3 style="margin-top: 0; color: #2c3e50; text-align: center;">🔥 집중 모드 성과 분석 (성공 vs 실패)</h3>
        <div id="chartContainer" style="min-height: 350px;"></div>
    </div>

    <div style="background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 25px;">
        <h3 style="margin-top: 0; color: #2c3e50; text-align: center;">🌱 최근 30일 공부 잔디 (Contribution)</h3>
        
        <div id="grassCalendar" style="display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; padding: 15px 0;">
            </div>
        
        <div style="text-align: center; margin-top: 15px; font-size: 13px; color: #7f8c8d; display: flex; justify-content: center; align-items: center; gap: 10px;">
            <span>안 함</span>
            <div style="width: 15px; height: 15px; background-color: #ebedf0; border-radius: 3px;"></div>
            <div style="width: 15px; height: 15px; background-color: #c6e48b; border-radius: 3px;"></div>
            <div style="width: 15px; height: 15px; background-color: #7bc96f; border-radius: 3px;"></div>
            <div style="width: 15px; height: 15px; background-color: #196127; border-radius: 3px;"></div>
            <span>열공!</span>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://twdptukivwkkzwlzewrz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3ZHB0dWtpdndra3p3bHpld3J6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3ODM5ODYsImV4cCI6MjA5NTM1OTk4Nn0.unQ8K0i_WEWsk5kORAEDfawCy5amGHLSEJ5Coo3DjaA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // ★ 1. 공통 대한민국 KST 날짜 고정 ★
        const now = new Date();
        const koreaTime = new Date(now.getTime() + (9 * 60 * 60 * 1000));
        const today = koreaTime.toISOString().split('T')[0];

        async function loadStatistics() {
            const { data: logs, error } = await supabaseClient
                .from('focus_logs')
                .select('*')
                .eq('seat_number', '105');

            if (error) {
                console.error(error);
                return;
            }

            const todayLogs = (logs || []).filter(log => log.created_at.startsWith(today));
            let todaySeconds = 0, successCount = 0, interruptedCount = 0, stopwatchCount = 0;

            todayLogs.forEach(log => {
                todaySeconds += log.actual_seconds;
                if (log.status === 'SUCCESS') successCount++;
                else if (log.status === 'INTERRUPTED') interruptedCount++;
                else if (log.status === 'STOPWATCH') stopwatchCount++;
            });

            document.getElementById('totalTimeDisplay').innerText = 
                `${Math.floor(todaySeconds / 3600)}시간 ${Math.floor((todaySeconds % 3600) / 60)}분`;

            const chartOptions = {
                chart: { type: 'donut', width: '100%', animations: { enabled: true, speed: 800 } },
                series: [successCount, interruptedCount, stopwatchCount], 
                labels: ['목표 달성 (SUCCESS)', '중도 포기 (INTERRUPTED)', '자유 스톱워치 (STOPWATCH)'], 
                colors: ['#2ecc71', '#e74c3c', '#f1c40f'], 
                noData: { text: "오늘 기록이 없습니다.", align: 'center', verticalAlign: 'middle' }
            };
            new ApexCharts(document.querySelector("#chartContainer"), chartOptions).render();


            // --- 2. 새로 추가된 30일 잔디 달력 로직 ---
            const dailyStats = {};
            
            (logs || []).forEach(log => {
                const dateStr = log.created_at.split('T')[0]; 
                if (!dailyStats[dateStr]) dailyStats[dateStr] = 0;
                dailyStats[dateStr] += log.actual_seconds;
            });

            const grassContainer = document.getElementById('grassCalendar');
            let grassHTML = '';

            for(let i = 29; i >= 0; i--) {
                // ★ 2. 잔디 달력 과거 날짜 구하기 KST 고정 ★
                // 한국 시간(koreaTime) 기준으로 정확히 i일 치 밀리초(ms)를 빼서 계산합니다.
                const targetTime = new Date(koreaTime.getTime() - (i * 24 * 60 * 60 * 1000));
                const dateString = targetTime.toISOString().split('T')[0];
                
                const seconds = dailyStats[dateString] || 0;
                const minutes = Math.floor(seconds / 60);
                
                let color = '#ebedf0';
                if (minutes > 0 && minutes < 60) color = '#c6e48b';       
                else if (minutes >= 60 && minutes < 120) color = '#7bc96f'; 
                else if (minutes >= 120) color = '#196127';               

                grassHTML += `<div title="${dateString} : ${minutes}분 공부함" style="width: 25px; height: 25px; background-color: ${color}; border-radius: 5px; cursor: pointer; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'"></div>`;
            }

            grassContainer.innerHTML = grassHTML;
        }

        loadStatistics();
    </script>
</body>
</html>
