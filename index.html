<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 플래너 MVP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: sans-serif; padding: 20px; background-color: #f3f4f6;">

    <h1 style="color: #333;">📝 나의 학습 플래너 (105번 김철수)</h1>
    
    <div style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px;">
        <h3>오늘 할 일 추가하기</h3>
        <select id="subjectInput" style="padding: 10px; font-size: 16px;">
            <option value="국어">국어</option>
            <option value="수학">수학</option>
            <option value="영어">영어</option>
            <option value="탐구">탐구</option>
        </select>
        
        <input type="text" id="contentInput" placeholder="예: 뉴런 수1 3강 완강" style="padding: 10px; font-size: 16px; width: 250px;">
        <button onclick="addTask()" style="padding: 10px 20px; font-size: 16px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer;">추가</button>
    </div>

    <div style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h3>오늘의 계획 리스트</h3>
        <ul id="taskList" style="font-size: 18px; line-height: 1.8; list-style: none; padding-left: 0;">
            데이터를 불러오는 중...
        </ul>
    </div>

    <script>
        // ★여기에 URL과 KEY를 다시 넣어주세요!★
        const SUPABASE_URL = 'https://twdptukivwkkzwlzewrz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3ZHB0dWtpdndra3p3bHpld3J6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3ODM5ODYsImV4cCI6MjA5NTM1OTk4Nn0.unQ8K0i_WEWsk5kORAEDfawCy5amGHLSEJ5Coo3DjaA';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const today = new Date().toISOString().split('T')[0];

        // 1. 읽기 (Read)
        async function fetchTasks() {
            const { data, error } = await supabaseClient
                .from('planner_tasks')
                .select('*')
                .eq('seat_number', '105')
                .eq('task_date', today)
                .order('created_at', { ascending: true });
            
            if (error) return;

            const listElement = document.getElementById('taskList');
            listElement.innerHTML = ''; 

            if (data.length === 0) {
                listElement.innerHTML = '<li>아직 등록된 계획이 없습니다.</li>';
                return;
            }

            data.forEach(task => {
                const isChecked = task.is_completed ? "checked" : "";
                const textStyle = task.is_completed ? "text-decoration: line-through; color: #999;" : "color: #333;";

                // ★수정된 부분: 맨 끝에 빨간색 [삭제] 버튼을 추가했습니다!★
                listElement.innerHTML += `
                    <li style="margin-bottom: 10px; display: flex; align-items: center;">
                        <label style="cursor: pointer; ${textStyle} flex-grow: 1;">
                            <input type="checkbox" onchange="toggleTask('${task.task_id}', ${task.is_completed})" ${isChecked} style="transform: scale(1.3); margin-right: 10px;">
                            [${task.subject}] ${task.content}
                        </label>
                        <button onclick="deleteTask('${task.task_id}')" style="background: none; border: none; color: #ff4d4d; font-weight: bold; cursor: pointer; padding: 5px 10px; font-size: 16px;">
                            ✕ 삭제
                        </button>
                    </li>`;
            });
        }

        // 2. 추가 (Create)
        async function addTask() {
            const subjectValue = document.getElementById('subjectInput').value;
            const contentValue = document.getElementById('contentInput').value;

            if (contentValue === "") {
                alert("할 일 내용을 입력해주세요!");
                return;
            }

            const { error } = await supabaseClient
                .from('planner_tasks')
                .insert([{ seat_number: '105', task_date: today, subject: subjectValue, content: contentValue }]);

            if (!error) {
                document.getElementById('contentInput').value = "";
                fetchTasks(); 
            }
        }

        // 3. 수정 (Update)
        async function toggleTask(taskId, currentStatus) {
            const newStatus = !currentStatus; 
            const { error } = await supabaseClient
                .from('planner_tasks')
                .update({ is_completed: newStatus })
                .eq('task_id', taskId);

            if (!error) fetchTasks(); 
        }

        // ★4. 새로 추가된 삭제 (Delete) 기능★
        async function deleteTask(taskId) {
            // 진짜 지울 건지 한 번 더 물어보기
            if (!confirm("이 계획을 정말 삭제할까요?")) {
                return; 
            }

            const { error } = await supabaseClient
                .from('planner_tasks')
                .delete()
                .eq('task_id', taskId); // 이 ID를 가진 할 일만 DB에서 날려라!

            if (error) {
                alert("삭제 중 에러가 발생했습니다: " + error.message);
            } else {
                fetchTasks(); // 삭제 성공하면 목록 새로고침
            }
        }

        fetchTasks();
    </script>
</body>
</html>
