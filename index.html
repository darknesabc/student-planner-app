<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 플래너 MVP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: sans-serif; padding: 20px; background-color: #f3f4f6; max-width: 800px; margin: 0 auto;">

    <h1 style="color: #333; text-align: center;">📝 나의 학습 플래너 (105번 김철수)</h1>

    <div style="text-align: right; margin-bottom: 20px;">
        <a href="stats.html" style="padding: 10px 20px; background-color: #9b59b6; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 14px;">📊 나의 학습 통계 보러 가기</a>
    </div>
    
    <div style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px;">
        <h3>📌 오늘 할 일 추가하기</h3>
        <select id="subjectInput" style="padding: 10px; font-size: 16px;">
            <option value="국어">국어</option>
            <option value="수학">수학</option>
            <option value="영어">영어</option>
            <option value="탐구">탐구</option>
        </select>
        <input type="text" id="contentInput" placeholder="예: 뉴런 수1 3강 완강" style="padding: 10px; font-size: 16px; width: 250px;">
        <button onclick="addTask()" style="padding: 10px 20px; font-size: 16px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer;">추가</button>
    </div>

    <div style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px;">
        <h3>📋 오늘의 계획 리스트</h3>
        <ul id="taskList" style="font-size: 18px; line-height: 1.8; list-style: none; padding-left: 0;">
            데이터를 불러오는 중...
        </ul>
    </div>

    <div style="display: flex; gap: 20px; flex-wrap: wrap;">
        
        <div style="flex: 1; min-width: 300px; background: #2c3e50; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); color: white; text-align: center;">
            <h3 style="margin-top: 0; color: #ecf0f1;">🔥 집중 모드 (역산)</h3>
            
            <div style="margin-bottom: 20px;">
                목표: <input type="number" id="targetMinutes" value="" style="width: 60px; padding: 5px; font-size: 16px; text-align: center;"> 분
            </div>

            <div id="timerDisplay" style="font-size: 50px; font-weight: bold; margin-bottom: 10px; font-family: monospace; letter-spacing: 2px;">
                00:00:00
            </div>

            <div style="width: 100%; height: 8px; background-color: #1a252f; border-radius: 4px; margin-bottom: 25px; overflow: hidden;">
                <div id="progressFill" style="width: 100%; height: 100%; background-color: #2ecc71; transition: background-color 0.5s ease;"></div>
            </div>

            <div>
                <button id="startBtn" onclick="startFocus()" style="padding: 12px 25px; font-size: 16px; background-color: #e74c3c; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">시작</button>
                <button id="stopBtn" onclick="stopFocus()" style="padding: 12px 25px; font-size: 16px; background-color: #95a5a6; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; display: none;">포기</button>
            </div>
        </div>

        <div style="flex: 1; min-width: 300px; background: #34495e; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); color: white; text-align: center;">
            <h3 style="margin-top: 0; color: #ecf0f1;">⏱️ 순공 측정 (스톱워치)</h3>
            
            <div style="margin-bottom: 20px; color: #bdc3c7;">
                시간 제한 없이 쭉 달립니다!
            </div>

            <div id="stopwatchDisplay" style="font-size: 50px; font-weight: bold; margin-bottom: 43px; font-family: monospace; letter-spacing: 2px; color: #f1c40f;">
                00:00:00
            </div>

            <div style="display: flex; justify-content: center; gap: 10px;">
                <button id="swStartBtn" onclick="toggleStopwatch()" style="padding: 12px 20px; font-size: 16px; background-color: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">공부 시작</button>
                <button id="swPauseBtn" onclick="pauseStopwatch()" style="padding: 12px 20px; font-size: 16px; background-color: #f39c12; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; display: none;">일시 정지</button>
                <button id="swStopBtn" onclick="stopStopwatch()" style="padding: 12px 20px; font-size: 16px; background-color: #e67e22; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; display: none;">종료 및 저장</button>
            </div>
        </div>

    </div>

    <script>
        const SUPABASE_URL = 'https://twdptukivwkkzwlzewrz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3ZHB0dWtpdndra3p3bHpld3J6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3ODM5ODYsImV4cCI6MjA5NTM1OTk4Nn0.unQ8K0i_WEWsk5kORAEDfawCy5amGHLSEJ5Coo3DjaA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        const today = new Date().toISOString().split('T')[0];

        // --- 1. 할 일(To-Do) 로직 ---
        async function fetchTasks() {
            const { data, error } = await supabaseClient.from('planner_tasks').select('*').eq('seat_number', '105').eq('task_date', today).order('created_at', { ascending: true });
            if (error) return;
            const listElement = document.getElementById('taskList');
            listElement.innerHTML = ''; 
            if (data.length === 0) { listElement.innerHTML = '<li>아직 등록된 계획이 없습니다.</li>'; return; }
            data.forEach(task => {
                const isChecked = task.is_completed ? "checked" : "";
                const textStyle = task.is_completed ? "text-decoration: line-through; color: #999;" : "color: #333;";
                listElement.innerHTML += `
                    <li style="margin-bottom: 10px; display: flex; align-items: center;">
                        <label style="cursor: pointer; ${textStyle} flex-grow: 1;">
                            <input type="checkbox" onchange="toggleTask('${task.task_id}', ${task.is_completed})" ${isChecked} style="transform: scale(1.3); margin-right: 10px;">
                            [${task.subject}] ${task.content}
                        </label>
                        <button onclick="deleteTask('${task.task_id}')" style="background: none; border: none; color: #ff4d4d; font-weight: bold; cursor: pointer; padding: 5px 10px; font-size: 16px;">✕ 삭제</button>
                    </li>`;
            });
        }
        async function addTask() {
            const subjectValue = document.getElementById('subjectInput').value;
            const contentValue = document.getElementById('contentInput').value;
            if (contentValue === "") return alert("내용을 입력해주세요!");
            const { error } = await supabaseClient.from('planner_tasks').insert([{ seat_number: '105', task_date: today, subject: subjectValue, content: contentValue }]);
            if (!error) { document.getElementById('contentInput').value = ""; fetchTasks(); }
        }
        async function toggleTask(taskId, currentStatus) {
            const { error } = await supabaseClient.from('planner_tasks').update({ is_completed: !currentStatus }).eq('task_id', taskId);
            if (!error) fetchTasks(); 
        }
        async function deleteTask(taskId) {
            if (!confirm("삭제할까요?")) return; 
            const { error } = await supabaseClient.from('planner_tasks').delete().eq('task_id', taskId);
            if (!error) fetchTasks(); 
        }
        fetchTasks();

        // --- 2. 집중 모드 타이머 로직 (역산) ---
        let animationFrameId; 
        let endTime;       
        let targetMins;    
        let totalDurationMs;

        function startFocus() {
            targetMins = parseInt(document.getElementById('targetMinutes').value);
            if (targetMins <= 0 || isNaN(targetMins)) return alert("정확한 분을 입력하세요!");
            totalDurationMs = targetMins * 60 * 1000;
            endTime = Date.now() + totalDurationMs; 
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'inline-block';
            document.getElementById('targetMinutes').disabled = true; 
            document.getElementById('progressFill').style.backgroundColor = "#2ecc71";
            updateTimerUI(); 
        }

        function updateTimerUI() {
            const now = Date.now();
            let remainingMs = endTime - now; 
            if (remainingMs <= 0) {
                remainingMs = 0;
                document.getElementById('timerDisplay').innerText = "00:00:00";
                document.getElementById('progressFill').style.width = "0%";
                finishFocus('SUCCESS'); 
                return; 
            }
            const remainingSec = Math.floor(remainingMs / 1000);
            const h = String(Math.floor(remainingSec / 3600)).padStart(2, '0');
            const m = String(Math.floor((remainingSec % 3600) / 60)).padStart(2, '0');
            const s = String(remainingSec % 60).padStart(2, '0');
            document.getElementById('timerDisplay').innerText = `${h}:${m}:${s}`;
            
            const percent = (remainingMs / totalDurationMs) * 100;
            document.getElementById('progressFill').style.width = percent + "%";
            if (remainingMs <= 60000) document.getElementById('progressFill').style.backgroundColor = "#e74c3c";
            animationFrameId = requestAnimationFrame(updateTimerUI); 
        }

        function stopFocus() {
            if(confirm("정말 포기하시겠습니까? 기록은 저장됩니다.")) finishFocus('INTERRUPTED'); 
        }

        async function finishFocus(status) {
            cancelAnimationFrame(animationFrameId); 
            const now = Date.now();
            const actualSeconds = targetMins * 60 - Math.floor(Math.max(0, endTime - now) / 1000);
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('targetMinutes').disabled = false;
            document.getElementById('timerDisplay').innerText = "00:00:00";
            document.getElementById('progressFill').style.width = "100%";
            document.getElementById('progressFill').style.backgroundColor = "#2ecc71";
            if(status === 'SUCCESS') alert("축하합니다! 목표 시간을 달성했습니다!");

            await supabaseClient.from('focus_logs').insert([{ seat_number: '105', target_minutes: targetMins, actual_seconds: actualSeconds, status: status }]);
        }

        // --- ★ 3. 일시정지가 추가된 스톱워치 로직 ★ ---
        let swAnimationFrameId;
        let swStartTime = 0;         // 마지막으로 [시작/이어서하기]를 누른 시점
        let accumulatedMs = 0;       // 일시정지 할 때마다 누적된 시간 바구니
        let isSwRunning = false;     // 현재 타이머가 돌아가고 있는지 확인하는 스위치

        // 시작 또는 이어서 하기 버튼
        function toggleStopwatch() {
            if (!isSwRunning) {
                swStartTime = Date.now(); // 지금부터 시간 잰다!
                isSwRunning = true;
                
                // UI 버튼 바꾸기
                document.getElementById('swStartBtn').style.display = 'none';
                document.getElementById('swPauseBtn').style.display = 'inline-block';
                document.getElementById('swStopBtn').style.display = 'inline-block';
                
                updateStopwatchUI();
            }
        }

        // 일시 정지 버튼
        function pauseStopwatch() {
            if (isSwRunning) {
                // 핵심: 지금까지 달려온 시간을 바구니(accumulatedMs)에 담아둡니다!
                accumulatedMs += (Date.now() - swStartTime);
                isSwRunning = false;
                cancelAnimationFrame(swAnimationFrameId); // 화면 그리기 멈춤
                
                // UI 버튼 바꾸기 ('이어서 하기'로 이름 변경)
                document.getElementById('swStartBtn').innerText = '이어서 하기';
                document.getElementById('swStartBtn').style.display = 'inline-block';
                document.getElementById('swStartBtn').style.backgroundColor = "#27ae60"; // 초록색으로 변경
                document.getElementById('swPauseBtn').style.display = 'none';
            }
        }

        // 화면에 숫자 그리기
        function updateStopwatchUI() {
            if (!isSwRunning) return;
            
            const now = Date.now();
            // 총 시간 = 바구니에 담긴 시간 + 방금 시작해서 지금까지 흐른 시간
            const currentElapsedMs = accumulatedMs + (now - swStartTime);
            const elapsedSec = Math.floor(currentElapsedMs / 1000);

            const h = String(Math.floor(elapsedSec / 3600)).padStart(2, '0');
            const m = String(Math.floor((elapsedSec % 3600) / 60)).padStart(2, '0');
            const s = String(elapsedSec % 60).padStart(2, '0');

            document.getElementById('stopwatchDisplay').innerText = `${h}:${m}:${s}`;
            swAnimationFrameId = requestAnimationFrame(updateStopwatchUI); 
        }

        // 종료 및 DB 저장 버튼
        async function stopStopwatch() {
            if(!confirm("공부를 종료하고 순공 시간을 저장할까요?")) return;

            let finalElapsedMs = accumulatedMs;
            
            // 만약 일시 정지가 아니라 막 돌아가고 있는 도중에 종료를 눌렀다면?
            if (isSwRunning) {
                finalElapsedMs += (Date.now() - swStartTime); // 마지막까지 달린 시간 추가
            }
            
            isSwRunning = false;
            cancelAnimationFrame(swAnimationFrameId);
            const actualSeconds = Math.floor(finalElapsedMs / 1000);

            // 전부 초기화 시키기
            accumulatedMs = 0;
            document.getElementById('swStartBtn').innerText = '공부 시작';
            document.getElementById('swStartBtn').style.backgroundColor = "#3498db"; // 파란색으로 원상복구
            document.getElementById('swStartBtn').style.display = 'inline-block';
            document.getElementById('swPauseBtn').style.display = 'none';
            document.getElementById('swStopBtn').style.display = 'none';
            document.getElementById('stopwatchDisplay').innerText = "00:00:00";

            alert(`수고하셨습니다! 총 ${actualSeconds}초 동안 공부했습니다.`);

            const { error } = await supabaseClient
                .from('focus_logs')
                .insert([{ seat_number: '105', target_minutes: 0, actual_seconds: actualSeconds, status: 'STOPWATCH' }]);

            if(error) console.error("스톱워치 기록 에러:", error);
        }
    </script>
</body>
</html>
