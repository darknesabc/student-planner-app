<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학생 플래너 MVP</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="font-family: sans-serif; padding: 20px; background-color: #f3f4f6;">

    <h1 style="color: #333;">나의 첫 플래너 웹페이지! 🎉</h1>
    
    <div id="data-box" style="background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-size: 18px;">
        데이터를 불러오는 중... 잠시만 기다려주세요!
    </div>

    <script>
        // ★여기에 아까 메모장에 적어둔 URL과 KEY를 따옴표('') 안에 정확히 붙여넣으세요!★
        const SUPABASE_URL = 'https://twdptukivwkkzwlzewrz.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR3ZHB0dWtpdndra3p3bHpld3J6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3ODM5ODYsImV4cCI6MjA5NTM1OTk4Nn0.unQ8K0i_WEWsk5kORAEDfawCy5amGHLSEJ5Coo3DjaA';
        
        // Supabase 연결!
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Supabase에서 데이터를 가져오는 마법의 함수
        async function fetchData() {
            // 'students' 테이블에서 모든 데이터 가져오기
            const { data, error } = await supabase.from('students').select('*');
            
            // 만약 에러가 났다면?
            if (error) {
                document.getElementById('data-box').innerText = "에러가 났어요 ㅠㅠ : " + error.message;
                return;
            }
            
            // 성공했다면 화면의 박스 내용을 김철수 데이터로 바꾸기!
            document.getElementById('data-box').innerHTML = 
                "<strong>Supabase 연결 성공!</strong><br><br>" +
                "불러온 학생 이름: <span style='color: blue;'>" + data[0].student_name + "</span><br>" +
                "학생 좌석 번호: " + data[0].seat_number;
        }

        // 함수 실행하기
        fetchData();
    </script>
</body>
</html>
